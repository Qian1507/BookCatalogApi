# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - bookcatalogapi-qian

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  WEBAPP_PATH: ./BookCatalogApi/BookCatalogApi.csproj
  PUBLISH_PATH: ${{ github.workspace }}/publish

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          
      - name: Restore
        run: dotnet restore ${{ env.WEBAPP_PATH }}
        
      - name: Build with dotnet
        run: dotnet build ${{ env.WEBAPP_PATH }} --configuration Release --no-restore

      - name: dotnet publish
        run: dotnet publish ${{ env.WEBAPP_PATH }} --configuration Release --no-build --output ${{ env.PUBLISH_PATH }}

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.PUBLISH_PATH }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ${{ github.workspace }}/publish
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FA8B87BB57104B9BB4A9FEAD44DB5506 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C76570431B2945E8807491E267C56BBD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_0AE533B3B3664524A63606D85490B3D8 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'bookcatalogapi-qian'
          slot-name: 'Production'
          package: ${{ github.workspace }}/publish
          
